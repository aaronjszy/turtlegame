<!DOCTYPE html>
<html lang="en"> 
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baby Gopher Tortoise</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #1a0a00; font-family: 'Comic Sans MS', 'Chalkboard SE', cursive; }
      canvas { display: block; }

      /* Pulse energy icons while walking so the drain is visually obvious */
      @keyframes energy-drain {
        from { opacity: 1; transform: scale(1); }
        to   { opacity: 0.5; transform: scale(0.88); }
      }
      body.turtle-moving #energy {
        animation: energy-drain 0.6s ease-in-out infinite alternate;
      }

      /* Flash red + shake when a stat takes a hit */
      @keyframes stat-hit {
        0%   { filter: none;                                          transform: translateX(0);    }
        15%  { filter: drop-shadow(0 0 10px #ff3300) brightness(2);  transform: translateX(-6px); }
        30%  { filter: drop-shadow(0 0 10px #ff3300) brightness(2);  transform: translateX( 6px); }
        50%  { filter: drop-shadow(0 0 6px  #ff3300) brightness(1.6);transform: translateX(-4px); }
        70%  { filter: drop-shadow(0 0 6px  #ff3300) brightness(1.6);transform: translateX( 4px); }
        100% { filter: none;                                          transform: translateX(0);    }
      }
      .stat-hit {
        animation: stat-hit 0.7s ease-out forwards !important;
      }

      #hud {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        pointer-events: none;
        z-index: 10;
      }

      #hunger {
        position: absolute;
        top: 16px; left: 16px;
        font-size: 28px;
        letter-spacing: 4px;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      }

      #energy {
        position: absolute;
        top: 16px; right: 16px;
        font-size: 28px;
        letter-spacing: 4px;
        text-shadow: 0 2px 4px rgba(0,0,0,0.5);
      }

      #dayinfo {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.35);
        color: #fff8e1;
        padding: 6px 18px;
        border-radius: 20px;
        font-size: 18px;
        text-shadow: 0 1px 3px rgba(0,0,0,0.6);
      }

      #message {
        position: absolute;
        top: 15%;
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        font-size: 28px;
        text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        text-align: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.4s;
      }

      #overlay {
        position: fixed;
        inset: 0;
        background: #1a0a00;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 100;
        color: #fff8e1;
      }

      #overlay h1 {
        font-size: 48px;
        margin-bottom: 12px;
        text-shadow: 0 2px 8px rgba(0,0,0,0.6);
      }

      #overlay p {
        font-size: 20px;
        margin-bottom: 32px;
        opacity: 0.85;
      }

      #nameForm {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      #nameInput {
        font-family: inherit;
        font-size: 22px;
        padding: 10px 18px;
        border-radius: 12px;
        border: 3px solid #f4c460;
        background: rgba(255,255,255,0.1);
        color: #fff8e1;
        outline: none;
        width: 220px;
        text-align: center;
      }

      #nameInput::placeholder { color: rgba(255,248,225,0.5); }

      #nameSubmit {
        font-family: inherit;
        font-size: 20px;
        padding: 10px 24px;
        border-radius: 12px;
        border: none;
        background: #f4c460;
        color: #3b2000;
        cursor: pointer;
        font-weight: bold;
        pointer-events: all;
      }

      #nameSubmit:hover { background: #f9d87a; }

      #summary {
        position: fixed;
        inset: 0;
        background: rgba(10,5,0,0.85);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 95;
        color: #fff8e1;
        pointer-events: all;
      }

      #summary h2 { font-size: 36px; margin-bottom: 20px; }
      #summary .lines { font-size: 20px; line-height: 2; text-align: center; }
      #summary button {
        margin-top: 28px;
        font-family: inherit;
        font-size: 20px;
        padding: 10px 28px;
        border-radius: 12px;
        border: none;
        background: #f4c460;
        color: #3b2000;
        cursor: pointer;
        font-weight: bold;
        pointer-events: all;
      }
      #summary button:hover { background: #f9d87a; }

      #saveSlots {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
        margin-bottom: 24px;
      }

      .saveSlot {
        font-family: inherit;
        font-size: 18px;
        padding: 12px 32px;
        border-radius: 14px;
        border: 2px solid #f4c460;
        background: rgba(255,255,255,0.08);
        color: #fff8e1;
        cursor: pointer;
        width: 260px;
        text-align: center;
        line-height: 1.5;
      }

      .saveSlot:hover { background: rgba(244,196,96,0.2); }

      .saveSlot small {
        display: block;
        font-size: 13px;
        opacity: 0.7;
      }

      #newTurtleBtn {
        font-family: inherit;
        font-size: 17px;
        padding: 10px 28px;
        border-radius: 12px;
        border: 2px dashed rgba(255,248,225,0.4);
        background: transparent;
        color: rgba(255,248,225,0.7);
        cursor: pointer;
        width: 260px;
      }

      #newTurtleBtn:hover { border-color: #f4c460; color: #fff8e1; }

      #backBtn {
        font-family: inherit;
        font-size: 16px;
        padding: 8px 18px;
        border-radius: 10px;
        border: none;
        background: rgba(255,255,255,0.12);
        color: #fff8e1;
        cursor: pointer;
      }

      #backBtn:hover { background: rgba(255,255,255,0.22); }

      .saveSlotRow {
        display: flex;
        gap: 8px;
        align-items: stretch;
        width: 260px;
      }

      .saveSlotRow .saveSlot {
        flex: 1;
        width: auto;
      }

      .exportBtn {
        font-family: inherit;
        font-size: 18px;
        padding: 0 14px;
        border-radius: 14px;
        border: 2px solid rgba(244,196,96,0.5);
        background: rgba(255,255,255,0.06);
        color: #fff8e1;
        cursor: pointer;
        flex-shrink: 0;
      }

      .exportBtn:hover { background: rgba(244,196,96,0.2); border-color: #f4c460; }

      #importSaveBtn {
        font-family: inherit;
        font-size: 17px;
        padding: 10px 28px;
        border-radius: 12px;
        border: 2px dashed rgba(255,248,225,0.4);
        background: transparent;
        color: rgba(255,248,225,0.7);
        cursor: pointer;
        width: 260px;
      }

      #importSaveBtn:hover { border-color: #f4c460; color: #fff8e1; }
    </style>
  </head>
  <body>
    <div id="overlay"></div>

    <div id="hud">
      <div id="hunger"></div>
      <div id="energy"></div>
      <div id="dayinfo"></div>
      <div id="message"></div>
    </div>

    <div id="summary">
      <h2>🌙 Good night!</h2>
      <div class="lines" id="summaryLines"></div>
      <button id="summaryOk">Wake up! ☀️</button>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
